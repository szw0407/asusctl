name: Build Arch Packages

on:
    release:
        types: [published]

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        container:
            image: archlinux/archlinux:base-devel
        steps:
            - name: Prepare container
              run: |
                  pacman-key --init && pacman-key --populate archlinux
                  pacman -Syu --noconfirm git sudo

            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Create build user
              run: |
                  useradd -m builder
                  echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

            - name: Install makedepends
              run: |
                  pacman -Syu --noconfirm rust llvm clang at-spi2-core cairo gtk3

            - name: Determine pkgrel
              env:
                  BUCKET_PUBLIC_URL: ${{ vars.BUCKET_PUBLIC_URL }}
                  RELEASE_TAG: ${{ github.event.release.tag_name }}
              run: |
                  git config --global --add safe.directory "$PWD"
                  PKGREL=1
                  if [ -n "$BUCKET_PUBLIC_URL" ] && curl -sf "$BUCKET_PUBLIC_URL/ogc.db.tar.gz" -o /tmp/ogc.db.tar.gz; then
                      pkgver=$(git describe --long --tags "$RELEASE_TAG" | sed 's/\([^-]*-g\)/r\1/;s/-/./g')
                      LAST=0
                      for pkgname in asusctl rog-control-center; do
                          rel=$(bsdtar -xOzf /tmp/ogc.db.tar.gz 2>/dev/null \
                              | strings \
                              | grep -E "^${pkgname}-${pkgver}-[0-9]+-x86_64\.pkg\.tar\.zst$" \
                              | sed -E "s/^${pkgname}-${pkgver}-([0-9]+)-.*/\1/" \
                              | sort -n | tail -1)
                          [ -n "$rel" ] && [ "$rel" -gt "$LAST" ] && LAST=$rel
                      done
                      [ "$LAST" -gt 0 ] && PKGREL=$((LAST + 1))
                  fi
                  echo "PKGREL=$PKGREL" >> "$GITHUB_ENV"

            - name: Build packages
              run: |
                  git config --global --add safe.directory "$PWD"
                  _gitref=$(git rev-list -n 1 "${{ github.event.release.tag_name }}")
                  cp distro-packaging/PKGBUILD .
                  cp distro-packaging/asusctl.install .
                  chown -R builder:builder .
                  sudo -u builder \
                      CI_BUILD=1 \
                      _gitref="$_gitref" \
                      pkgrel="$PKGREL" \
                      makepkg -s --noconfirm

            - name: Upload release assets
              uses: softprops/action-gh-release@v3
              with:
                  files: |
                      *.pkg.tar.zst
                  fail_on_unmatched_files: true
